<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Permissions-Policy" content="autoplay=(self)" />
  <title>Selah TV</title>

  <link rel="icon" type="image/x-icon" href="favicon_32x32.ico" />
  <meta name="theme-color" content="#0b0f12" />

  <!-- Video.js (LOCAL, una sola vez) -->
  <link rel="stylesheet" href="assets/vendor/videojs/video-js.min.css">
  <link rel="stylesheet" href="assets/style.css?v=12" />

</head>

<body>
  <header class="topbar" aria-label="Selah">
    <img
      src="assets/Selah.png"
      class="topLogo"
      alt="Selah"
      loading="eager"
      decoding="async"
    />
  </header>

  <main class="container">
    

    <!-- HOME: categorías como tarjetas -->
    <section class="block" id="homeCategoriesBlock">
      <h2>Categorías</h2>
      <div class="grid" id="homeCategories"></div>
    </section>

    <!-- Accesos (HOME) -->
    <section class="block" id="shortcutsBlock">
      <h2 id="homeTitle">Accesos</h2>
      <div class="grid" id="shortcuts"></div>
    </section>

    <!-- VISTA CATEGORÍA -->
    <section class="block" id="categoryView" hidden>
      <div class="categoryHeader">
        <button id="btnBackToHome" class="btnBackHome" type="button" aria-label="Volver">⬅ Volver</button>
        <h2 id="categoryTitle" class="categoryHeaderTitle">Categoría</h2>
      </div>

            <div class="toolbar" id="categoryToolbar" hidden>
        <input id="categorySearch" class="searchInput" type="search" placeholder="Buscar..." autocomplete="off" />
        <button id="btnClearCategorySearch" class="btnGhost" type="button">Limpiar</button>
      </div>

<div class="grid" id="categoryGrid"></div>
    </section>

        <!-- ✅ VISTA DETALLE (Jellyfin-like) -->
    <section class="block" id="detailView" hidden>
      <div class="detailHeader">
        <button id="btnBackFromDetail" class="btnBackHome" type="button" aria-label="Volver">⬅ Volver</button>
        <h2 id="detailTitle" class="detailHeaderTitle">Detalle</h2>
      </div>

      <div class="detailWrap">
        <div class="detailPoster">
          <img id="detailPosterImg" alt="" loading="eager" decoding="async" />
        </div>

        <div class="detailInfo">
          <div class="detailMeta">
            <span class="metaChip"><strong>Año:</strong> <span id="detailYear">—</span></span>
            <span class="metaChip"><strong>Duración:</strong> <span id="detailDuration">—</span></span>
            <span class="metaChip"><strong>Género:</strong> <span id="detailGenre">—</span></span>
          </div>

          <div class="detailActions">
            <button id="btnDetailPlay" class="btnPrimary" type="button">▶ Reproducir</button>
            <button id="btnDetailEpisodes" class="btnGhost" type="button" hidden>📺 Episodios</button>
            <button id="btnDetailTrailer" class="btnGhost" type="button">🎬 Trailer</button>
          </div>

          <div class="detailDesc">
            <h3>Resumen</h3>
            <p id="detailDescText">—</p>
          </div>
        </div>
      </div>
    </section>

<!-- ✅ VISTA EPISODIOS (Series -> Episodios) -->
    <section class="block" id="episodeView" hidden>
      <div class="categoryHeader">
        <button id="btnBackToSeries" class="btnBackHome" type="button" aria-label="Volver a series">⬅ Volver</button>
        <h2 id="episodeTitle" class="categoryHeaderTitle">Episodios</h2>
      </div>

            <div class="toolbar" id="episodeToolbar" hidden>
        <input id="episodeSearch" class="searchInput" type="search" placeholder="Buscar episodios..." autocomplete="off" />
        <button id="btnClearEpisodeSearch" class="btnGhost" type="button">Limpiar</button>
      </div>

<div class="grid" id="episodeGrid"></div>
    </section>
  </main>

  <footer class="siteFooter">
    <div class="footerInner">
      <span>© <span id="year"></span> Complejo Selah</span>
      <span class="dot">•</span>
      <span>Creado por Hernan Falbo</span>
    </div>
  </footer>

  <!-- PLAYER -->
  <div id="player" aria-hidden="true">
    <!-- HUD -->
    <div id="playerHud" class="hud" role="toolbar" aria-label="Controles del reproductor">
      <button id="btnBack" class="hudBtn" type="button" aria-label="Volver">⬅ Volver</button>

      <div class="hudCenter" aria-live="polite" aria-atomic="true">
        <div id="nowPlaying" class="nowPlaying">Canal</div>
      </div>

      <div class="hudRight">
        <button id="btnSound" class="hudBtn" type="button" aria-label="Activar sonido">Activar sonido</button>
        <button id="btnGrid" class="hudBtn" type="button" aria-label="Abrir grilla">⧉ Grilla</button>
        <button id="btnPrev" class="hudBtn" type="button" aria-label="Canal anterior">⟵ Anterior</button>
        <button id="btnNext" class="hudBtn" type="button" aria-label="Canal siguiente">Siguiente ⟶</button>
      </div>
    </div>

    <!-- IFRAME (web/youtube) -->
    <iframe
      id="iframePlayer"
      frameborder="0"
      allow="autoplay; fullscreen; encrypted-media"
    ></iframe>

    <!-- VIDEO.JS -->
    <video
      id="videoPlayer"
      class="video-js vjs-default-skin"
      controls
      playsinline
      preload="auto"
    ></video>

    <!-- overlay para tap/click -->
    <div id="playerTap" aria-hidden="true" title="Mostrar controles"></div>

    <!-- Grilla -->
    <div id="playerGrid" class="playerGrid" hidden>
      <div class="playerGridInner">
        <h3>Canales</h3>
        <div id="gridInsidePlayer" class="grid"></div>
        <button id="btnCloseGrid" class="hudBtn" type="button" style="margin-top:12px;">
          Cerrar
        </button>
      </div>
    </div>
  </div>



  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

  <!-- Video.js (LOCAL, una sola vez) -->
  <script src="assets/vendor/videojs/video.min.js"></script>

  <!-- app.js SIEMPRE después de Video.js -->
  <script src="assets/app.js?v=17"></script>
</body>
</html>
